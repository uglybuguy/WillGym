<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WillGym</title>
    <!-- Tailwind para el diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
        }
        .logo-font { font-family: 'Orbitron', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type=number]::-webkit-inner-spin-button { display: none; }
        .day-active { 
            background: #4f46e5; 
            color: white; 
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.4); 
            border-color: #6366f1; 
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Header con el Logo Original -->
    <header class="p-6 pt-12 bg-slate-950 border-b border-indigo-900/30">
        <div class="flex items-center gap-3 mb-6">
            <svg viewBox="0 0 24 24" class="w-8 h-8 fill-indigo-500 shadow-indigo-500/50">
                <path d="M6,5V19H3V15H1V9H3V5H6M23,9H21V5H18V19H21V15H23V9M17,11V13H7V11H17M17,7H7V9H17V7M17,15H7V17H17V15Z" />
            </svg>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase logo-font">
                WILL<span class="text-indigo-500">GYM</span>
            </h1>
        </div>
        
        <!-- Selector de Días -->
        <div id="day-tabs" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            <!-- Se genera con JS -->
        </div>
    </header>

    <!-- Contenido Principal -->
    <main id="app-content" class="flex-1 overflow-y-auto p-4 pb-40 space-y-6">
        <!-- Se genera con JS -->
    </main>

    <!-- Botón Flotante -->
    <footer class="fixed bottom-0 left-0 right-0 p-6 bg-slate-950/80 backdrop-blur-md border-t border-slate-900 z-50">
        <button onclick="addGroup()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black text-sm uppercase tracking-widest text-white shadow-xl active:scale-95 transition-transform">
            + Añadir Grupo Muscular
        </button>
    </footer>

    <script>
        const DAYS = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
        let activeDay = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
        
        // Carga inicial de datos (LocalStorage)
        let db = JSON.parse(localStorage.getItem('willgym_final_db') || '{}');
        DAYS.forEach(d => { if(!db[d]) db[d] = { groups: [] }; });

        function save() {
            localStorage.setItem('willgym_final_db', JSON.stringify(db));
            render();
        }

        window.addGroup = () => {
            db[activeDay].groups.push({ name: 'NUEVO GRUPO', exercises: [] });
            save();
        };

        window.removeGroup = (gi) => {
            if(confirm('¿Eliminar este grupo muscular?')) {
                db[activeDay].groups.splice(gi, 1);
                save();
            }
        };

        window.addEx = (gi) => {
            db[activeDay].groups[gi].exercises.push({ 
                name: '', 
                sets: [{ w: 0, r: 0 }], 
                notes: '' 
            });
            save();
        };

        window.addSet = (gi, ei) => {
            const sets = db[activeDay].groups[gi].exercises[ei].sets;
            const last = sets[sets.length-1];
            sets.push({ w: last ? last.w : 0, r: last ? last.r : 0 });
            save();
        };

        window.updateSet = (gi, ei, si, k, v) => {
            db[activeDay].groups[gi].exercises[ei].sets[si][k] = v;
            localStorage.setItem('willgym_final_db', JSON.stringify(db));
        };

        function render() {
            // Render de Tabs
            const tabs = document.getElementById('day-tabs');
            tabs.innerHTML = '';
            DAYS.forEach(d => {
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 px-4 py-2 rounded-xl text-[10px] font-black border transition-all ${activeDay === d ? 'day-active' : 'bg-slate-900 border-slate-800 text-slate-600'}`;
                btn.innerText = d.toUpperCase();
                btn.onclick = () => { activeDay = d; render(); };
                tabs.appendChild(btn);
            });

            // Render de Contenido
            const main = document.getElementById('app-content');
            main.innerHTML = '';
            const dayData = db[activeDay].groups;

            if(dayData.length === 0) {
                main.innerHTML = `<div class="py-24 text-center opacity-20 text-[10px] font-black uppercase tracking-[0.3em]">Día de Descanso</div>`;
            }

            dayData.forEach((group, gi) => {
                const gDiv = document.createElement('div');
                gDiv.className = "bg-slate-900/40 border border-slate-800/60 rounded-[2.5rem] p-6 mb-6 shadow-2xl";
                gDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <input type="text" value="${group.name}" onchange="db['${activeDay}'].groups[${gi}].name=this.value.toUpperCase(); save();" class="bg-transparent text-xl font-black text-white outline-none w-full uppercase tracking-tighter">
                        <button onclick="removeGroup(${gi})" class="text-slate-700 p-2 text-lg">✕</button>
                    </div>
                    <div id="ex-container-${gi}" class="space-y-6"></div>
                    <button onclick="addEx(${gi})" class="w-full mt-6 py-4 rounded-2xl border-2 border-dashed border-slate-800 text-slate-600 font-bold text-[10px] uppercase tracking-widest">+ Nuevo Ejercicio</button>
                `;

                const exList = gDiv.querySelector(`#ex-container-${gi}`);
                group.exercises.forEach((ex, ei) => {
                    const exDiv = document.createElement('div');
                    exDiv.className = "bg-slate-950/40 rounded-[1.8rem] p-5 border border-slate-800/40";
                    
                    let setsHtml = ex.sets.map((s, si) => `
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-5 text-[9px] font-black text-indigo-500/50">${si+1}</span>
                            <div class="flex-1 bg-slate-900 rounded-xl flex px-3 items-center border border-slate-800/50">
                                <input type="number" value="${s.w}" onchange="updateSet(${gi}, ${ei}, ${si}, 'w', this.value)" class="w-full bg-transparent py-3 text-center outline-none text-sm font-bold text-indigo-300">
                                <span class="text-[8px] text-slate-700 font-black">KG</span>
                            </div>
                            <div class="flex-1 bg-slate-900 rounded-xl flex px-3 items-center border border-slate-800/50">
                                <input type="number" value="${s.r}" onchange="updateSet(${gi}, ${ei}, ${si}, 'r', this.value)" class="w-full bg-transparent py-3 text-center outline-none text-sm font-bold text-white">
                                <span class="text-[8px] text-slate-700 font-black">REPS</span>
                            </div>
                            <button onclick="db['${activeDay}'].groups[${gi}].exercises[${ei}].sets.splice(${si},1); save();" class="text-slate-800 p-1 font-bold">✕</button>
                        </div>
                    `).join('');

                    exDiv.innerHTML = `
                        <div class="flex justify-between mb-4 items-center">
                            <input type="text" value="${ex.name}" placeholder="EJERCICIO..." onchange="db['${activeDay}'].groups[${gi}].exercises[${ei}].name=this.value; save();" class="bg-transparent font-black text-white text-sm outline-none uppercase w-full placeholder:text-slate-800">
                            <button onclick="db['${activeDay}'].groups[${gi}].exercises.splice(${ei},1); save();" class="text-[10px] text-red-900/50 font-black ml-2">BORRAR</button>
                        </div>
                        <div class="space-y-1">${setsHtml}</div>
                        <button onclick="addSet(${gi}, ${ei})" class="w-full mt-3 py-2 bg-indigo-900/10 rounded-xl text-[9px] font-black text-indigo-500 uppercase tracking-tighter">+ Añadir Serie</button>
                        <textarea placeholder="Notas de técnica..." onchange="db['${activeDay}'].groups[${gi}].exercises[${ei}].notes=this.value; save();" class="w-full mt-4 bg-slate-950/40 border border-slate-800/50 rounded-xl p-3 text-[10px] text-slate-500 outline-none h-16 resize-none focus:border-indigo-500/30 transition-all">${ex.notes || ''}</textarea>
                    `;
                    exList.appendChild(exDiv);
                });
                main.appendChild(gDiv);
            });
        }

        // Iniciar
        render();
    </script>
</body>
</html>
