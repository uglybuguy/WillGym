<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>WillGym</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cargamos iconos con respaldo -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .logo-font { font-family: 'Orbitron', sans-serif; }
        .day-btn.active { 
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            color: white; 
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .group-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(79, 70, 229, 0.2);
            border-radius: 1.5rem;
            margin-bottom: 1.5rem;
            padding: 1.25rem;
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="p-6 pt-12 bg-slate-950 border-b border-indigo-900/30">
        <div class="flex items-center gap-3 mb-6">
            <svg viewBox="0 0 24 24" class="w-8 h-8 fill-indigo-500">
                <path d="M6,5V19H3V15H1V9H3V5H6M23,9H21V5H18V19H21V15H23V9M17,11V13H7V11H17M17,7H7V9H17V7M17,15H7V17H17V15Z" />
            </svg>
            <h1 class="text-xl font-900 logo-font italic tracking-tighter uppercase">
                WILL<span class="text-indigo-500">GYM</span>
            </h1>
        </div>
        
        <div class="flex gap-2 overflow-x-auto hide-scroll" id="day-tabs"></div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-32" id="main-container"></main>

    <footer class="fixed bottom-0 left-0 right-0 p-5 bg-slate-950/90 border-t border-slate-800">
        <button id="btn-add-group" class="w-full bg-indigo-600 py-4 rounded-xl font-bold uppercase tracking-widest text-sm text-white shadow-lg active:scale-95 transition-transform">
            + Añadir Grupo Muscular
        </button>
    </footer>

    <script>
        const DAYS = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
        let activeDay = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
        
        // Carga de datos con manejo de errores
        let db = {};
        try {
            const saved = localStorage.getItem('willgym_v5');
            db = saved ? JSON.parse(saved) : {};
        } catch(e) { db = {}; }

        DAYS.forEach(d => { if (!db[d]) db[d] = { groups: [] }; });

        function save() { localStorage.setItem('willgym_v5', JSON.stringify(db)); }

        function renderDayTabs() {
            const tabs = document.getElementById('day-tabs');
            tabs.innerHTML = '';
            DAYS.forEach(d => {
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 px-4 py-2 rounded-lg text-[10px] font-bold border border-slate-800 transition-all ${activeDay === d ? 'active' : 'bg-slate-900 text-slate-500'}`;
                btn.innerText = d.toUpperCase();
                btn.onclick = () => { activeDay = d; renderContent(); };
                tabs.appendChild(btn);
            });
        }

        function renderContent() {
            renderDayTabs();
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            const dayData = db[activeDay];

            if (!dayData.groups || dayData.groups.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-600 uppercase text-xs font-bold tracking-widest opacity-50">Día de descanso</div>`;
            } else {
                dayData.groups.forEach((group, gIdx) => {
                    const section = document.createElement('div');
                    section.className = "group-card";
                    section.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <input type="text" value="${group.name}" placeholder="GRUPO MUSCULAR" onchange="updateGroupName(${gIdx}, this.value)" class="bg-transparent text-lg font-bold text-white outline-none w-full uppercase">
                            <button onclick="removeGroup(${gIdx})" class="text-slate-500 px-2 font-bold">✕</button>
                        </div>
                        <div id="ex-list-${gIdx}" class="space-y-4 mb-4"></div>
                        <button onclick="addExercise(${gIdx})" class="w-full py-2 rounded-lg border border-dashed border-slate-700 text-slate-500 text-[10px] font-bold uppercase tracking-widest">+ Ejercicio</button>
                    `;

                    const exList = section.querySelector(`#ex-list-${gIdx}`);
                    group.exercises.forEach((ex, exIdx) => {
                        const exDiv = document.createElement('div');
                        exDiv.className = "bg-slate-900/50 p-3 rounded-xl border border-slate-800";
                        
                        let setsHtml = (ex.sets || []).map((set, sIdx) => `
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-[10px] font-bold text-indigo-500">${sIdx+1}</span>
                                <input type="number" value="${set.w}" onchange="updateSet(${gIdx}, ${exIdx}, ${sIdx}, 'w', this.value)" class="w-20 bg-slate-800 text-center py-1 rounded text-sm text-indigo-300 outline-none">
                                <span class="text-[8px] text-slate-500">KG</span>
                                <input type="number" value="${set.r}" onchange="updateSet(${gIdx}, ${exIdx}, ${sIdx}, 'r', this.value)" class="w-16 bg-slate-800 text-center py-1 rounded text-sm text-white outline-none">
                                <span class="text-[8px] text-slate-500">REPS</span>
                                <button onclick="removeSet(${gIdx}, ${exIdx}, ${sIdx})" class="ml-auto text-slate-700 font-bold">✕</button>
                            </div>
                        `).join('');

                        exDiv.innerHTML = `
                            <div class="flex justify-between mb-2">
                                <input type="text" value="${ex.name}" placeholder="Ejercicio" onchange="updateExName(${gIdx}, ${exIdx}, this.value)" class="bg-transparent font-bold text-white outline-none text-xs w-full uppercase">
                                <button onclick="removeExercise(${gIdx}, ${exIdx})" class="text-slate-700 text-xs font-bold">ELIMINAR</button>
                            </div>
                            <div class="space-y-1">${setsHtml}</div>
                            <button onclick="addSet(${gIdx}, ${exIdx})" class="w-full mt-2 py-1 bg-slate-800 rounded text-[9px] font-bold text-indigo-400 uppercase tracking-widest">+ Serie</button>
                            <textarea onchange="updateExNotes(${gIdx}, ${exIdx}, this.value)" placeholder="Anotaciones..." class="w-full mt-2 bg-slate-950/50 border border-slate-800 rounded p-2 text-[10px] text-slate-400 outline-none h-12 resize-none">${ex.notes || ''}</textarea>
                        `;
                        exList.appendChild(exDiv);
                    });
                    container.appendChild(section);
                });
            }
        }

        // Acciones globales (expuestas al window)
        window.updateGroupName = (g, v) => { db[activeDay].groups[g].name = v; save(); };
        window.removeGroup = (g) => { if(confirm('¿Eliminar?')){ db[activeDay].groups.splice(g, 1); renderContent(); save(); }};
        window.addExercise = (g) => { db[activeDay].groups[g].exercises.push({ name: '', sets: [{ w: 0, r: 0 }], notes: '' }); renderContent(); save(); };
        window.updateExName = (g, e, v) => { db[activeDay].groups[g].exercises[e].name = v; save(); };
        window.updateExNotes = (g, e, v) => { db[activeDay].groups[g].exercises[e].notes = v; save(); };
        window.addSet = (g, e) => { 
            const ex = db[activeDay].groups[g].exercises[e];
            const last = ex.sets.at(-1);
            ex.sets.push({ w: last ? last.w : 0, r: last ? last.r : 0 });
            renderContent(); save(); 
        };
        window.updateSet = (g, e, s, k, v) => { db[activeDay].groups[g].exercises[e].sets[s][k] = v; save(); };
        window.removeSet = (g, e, s) => { 
            const sets = db[activeDay].groups[g].exercises[e].sets;
            if(sets.length > 1) sets.splice(s, 1);
            renderContent(); save(); 
        };
        window.removeExercise = (g, e) => { db[activeDay].groups[g].exercises.splice(e, 1); renderContent(); save(); };

        // Botón principal
        document.getElementById('btn-add-group').addEventListener('click', () => {
            db[activeDay].groups.push({ name: '', exercises: [] });
            renderContent();
            save();
        });

        // Inicio
        window.onload = renderContent;
    </script>
</body>
</html>
